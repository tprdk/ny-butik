services:
  postgres:
    image: postgres:16-alpine
    container_name: nybutik-postgres
    environment:
      POSTGRES_DB: nybutik
      POSTGRES_USER: nybutik
      POSTGRES_PASSWORD: nybutik
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nybutik"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: nybutik-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: nybutik-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin;
        mc mb --ignore-existing local/ny-butik-images;
        mc anonymous set public local/ny-butik-images;
        echo 'MinIO bucket ready.';
      "

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: nybutik-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@nybutik.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    profiles:
      - tools

volumes:
  postgres_data:
  minio_data:
