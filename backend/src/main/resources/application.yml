spring:
  application:
    name: ny-butik-api
  profiles:
    active: local

  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        default_batch_fetch_size: 20
        jdbc:
          batch_size: 20
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  mail:
    host: ${MAIL_HOST:smtp.resend.com}
    port: ${MAIL_PORT:465}
    username: ${MAIL_USERNAME:resend}
    password: ${MAIL_PASSWORD}
    properties:
      mail.smtp.auth: true
      mail.smtp.ssl.enable: true

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

server:
  port: 8080
  error:
    include-message: never
    include-stacktrace: never
    include-binding-errors: never

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

app:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiry: 900        # 15 dakika (saniye)
    refresh-token-expiry: 604800    # 7 gün (saniye)

  cors:
    allowed-origins: ${FRONTEND_URL:http://localhost:5173}

  storage:
    endpoint: ${STORAGE_ENDPOINT}
    bucket: ${STORAGE_BUCKET:ny-butik-images}
    access-key: ${STORAGE_ACCESS_KEY}
    secret-key: ${STORAGE_SECRET_KEY}
    region: ${STORAGE_REGION:auto}
    public-url: ${STORAGE_PUBLIC_URL}

  payment:
    provider: ${PAYMENT_PROVIDER:mock}

  shipment:
    provider: ${SHIPMENT_PROVIDER:mock}

  notification:
    email:
      from: ${EMAIL_FROM:noreply@nybutik.com}
      from-name: ${EMAIL_FROM_NAME:NY Butik}

  shipping:
    base-fee: ${SHIPPING_BASE_FEE:49.90}
    free-shipping-threshold: ${FREE_SHIPPING_THRESHOLD:500.00}

  rate-limit:
    login:
      capacity: 10
      refill-minutes: 1
    register:
      capacity: 5
      refill-hours: 1

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] [%X{traceId}] %-5level %logger{36} - %msg%n"
  level:
    root: INFO
    com.nybutik: DEBUG
    org.hibernate.SQL: WARN
