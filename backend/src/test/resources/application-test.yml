spring:
  datasource:
    url: jdbc:tc:postgresql:16-alpine:///nybutik_test
    username: test
    password: test
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

app:
  jwt:
    secret: test-secret-key-must-be-at-least-32-characters-long
    access-token-expiry: 900
    refresh-token-expiry: 604800
  storage:
    endpoint: http://localhost:9000
    bucket: test-bucket
    access-key: test
    secret-key: test
    region: us-east-1
    public-url: http://localhost:9000/test-bucket
  payment:
    provider: mock
  shipment:
    provider: mock
  notification:
    email:
      from: test@nybutik.com
      from-name: NY Butik Test
  shipping:
    base-fee: 49.90
    free-shipping-threshold: 500.00

logging:
  level:
    root: WARN
    com.nybutik: DEBUG
